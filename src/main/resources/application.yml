spring:
  application:
    name: fashion-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fashion_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:12345}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: false
    repair-on-migrate: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:8081}
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  access-token-expiration: 86400000      # 1 day
  refresh-token-expiration: 604800000    # 7 days

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
  api-key: ${CLOUDINARY_API_KEY:demo}
  api-secret: ${CLOUDINARY_API_SECRET:demo}

ghn:
  api-url: https://online-gateway.ghn.vn/shiip/public-api
  token: ${GHN_TOKEN:demo-token}
  shop-id: ${GHN_SHOP_ID:0}

vnpay:
  url: https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
  tmn-code: ${VNPAY_TMN_CODE:DEMO1234}
  hash-secret: ${VNPAY_HASH_SECRET:DEMOSECRET123456}
  return-url: ${VNPAY_RETURN_URL:https://shopping-ecomerce.vercel.app/checkout/success}

payos:
  client-id: ${PAYOS_CLIENT_ID:test-client-id}
  api-key: ${PAYOS_API_KEY:test-api-key}
  checksum-key: ${PAYOS_CHECKSUM_KEY:test-checksum-key}
  return-url: ${PAYOS_RETURN_URL:http://localhost:3000/checkout/success}
  cancel-url: ${PAYOS_CANCEL_URL:http://localhost:3000/checkout}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
  return-url: ${STRIPE_RETURN_URL:http://localhost:3000/checkout/success}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,https://shopping-ecomerce.vercel.app,https://shopping-ecomerce1.vercel.app}

logging:
  level:
    com.fashion: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# ── AI Translation (admin productivity tool) ───────────────────────────────
# Set AI_TRANSLATION_API_KEY env var to enable. Leave empty to disable gracefully.
ai:
  translation:
    api-key: ${AI_TRANSLATION_API_KEY:}
    api-url: ${AI_TRANSLATION_API_URL:https://generativelanguage.googleapis.com/v1beta/openai/v1/chat/completions}
    model: ${AI_TRANSLATION_MODEL:gemini-2.5-flash}

# ── OpenAI Virtual Try-On ────────────────────────────────────────────────────
openai:
  api-key: ${OPENAI_API_KEY:}
  image-model: gpt-image-1
  image-size: 1024x1024
